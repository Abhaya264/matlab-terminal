name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-server:
    name: Build Go Server (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            matlab_arch: glnxa64
            binary: matlab-terminal-server
          - goos: darwin
            goarch: amd64
            matlab_arch: maci64
            binary: matlab-terminal-server
          - goos: darwin
            goarch: arm64
            matlab_arch: maca64
            binary: matlab-terminal-server
          - goos: windows
            goarch: amd64
            matlab_arch: win64
            binary: matlab-terminal-server.exe
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          mkdir -p ../dist/${{ matrix.matlab_arch }}
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o ../dist/${{ matrix.matlab_arch }}/${{ matrix.binary }} .

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.matlab_arch }}
          path: dist/${{ matrix.matlab_arch }}/

  build-mltbx:
    name: Package Terminal.mltbx
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all server binaries
        uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: dist/
          merge-multiple: false

      - name: Arrange binaries into dist/<arch>/
        run: |
          for dir in dist/server-*/; do
            arch=$(basename "$dir" | sed 's/^server-//')
            mkdir -p "dist/$arch"
            cp "$dir"/* "dist/$arch/"
          done
          chmod +x dist/*/matlab-terminal-server 2>/dev/null || true
          echo "--- dist/ layout ---"
          find dist -type f

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Build .mltbx
        uses: matlab-actions/run-command@v2
        with:
          command: run('build/package.m')

      - uses: actions/upload-artifact@v4
        with:
          name: Terminal.mltbx
          path: dist/Terminal.mltbx

  release:
    name: Create GitHub Release
    needs: build-mltbx
    runs-on: ubuntu-latest
    steps:
      - name: Download .mltbx
        uses: actions/download-artifact@v4
        with:
          name: Terminal.mltbx

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: Terminal.mltbx
          generate_release_notes: true
