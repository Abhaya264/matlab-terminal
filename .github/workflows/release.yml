# Copyright 2026 The MathWorks, Inc.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-server:
    name: Build Go Server (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            matlab_arch: glnxa64
            binary: matlab-terminal-server
          - goos: darwin
            goarch: amd64
            matlab_arch: maci64
            binary: matlab-terminal-server
          - goos: darwin
            goarch: arm64
            matlab_arch: maca64
            binary: matlab-terminal-server
          - goos: windows
            goarch: amd64
            matlab_arch: win64
            binary: matlab-terminal-server.exe
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'
          cache: false

      - name: Build
        run: |
          mkdir -p ../dist/${{ matrix.matlab_arch }}
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o ../dist/${{ matrix.matlab_arch }}/${{ matrix.binary }} .

      - uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.matlab_arch }}
          path: dist/${{ matrix.matlab_arch }}/

  build-mltbx:
    name: Package Terminal.mltbx
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all server binaries
        uses: actions/download-artifact@v8
        with:
          pattern: server-*
          path: dist/
          merge-multiple: false

      - name: Arrange binaries into dist/<arch>/
        run: |
          for dir in dist/server-*/; do
            arch=$(basename "$dir" | sed 's/^server-//')
            mkdir -p "dist/$arch"
            cp "$dir"/* "dist/$arch/"
          done
          chmod +x dist/*/matlab-terminal-server 2>/dev/null || true
          echo "--- dist/ layout ---"
          find dist -type f

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3

      - name: Build .mltbx
        uses: matlab-actions/run-command@v3
        with:
          command: addpath('build'); package("${{ github.ref_name }}")

      - uses: actions/upload-artifact@v7
        with:
          name: Terminal.mltbx
          path: dist/Terminal.mltbx

  release:
    name: Create GitHub Release
    needs: build-mltbx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download .mltbx
        uses: actions/download-artifact@v8
        with:
          name: Terminal.mltbx

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi
          {
            git log --pretty=format:"- %s" "$RANGE"
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}...${GITHUB_REF_NAME}"
          } > release_notes.md

      - name: Determine release type
        id: release-type
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Anything with a hyphen after the version (e.g. -rc1, -beta2, -pr42)
          # is a prerelease per semver convention.
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: Terminal.mltbx
          body_path: release_notes.md
          generate_release_notes: true
          prerelease: ${{ steps.release-type.outputs.prerelease }}
