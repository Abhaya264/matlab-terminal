name: Unit Tests

on:
  workflow_call:
    inputs:
      matlab_version:
        type: string
        default: 'latest'
      os:
        type: string
        default: 'ubuntu-latest'

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test'
        required: true
        default: 'main'
        type: string
      matlab_version:
        description: 'MATLAB version (e.g., R2025b, R2026a)'
        required: true
        default: 'latest'
        type: string
      os:
        description: 'Runner OS'
        required: true
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - windows-latest
          - macos-latest

jobs:
  go:
    name: Go Tests
    runs-on: ${{ inputs.os || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Read Go version from go.mod
        id: go-version
        run: |
          GO_VERSION=$(grep "^go " go.mod | awk '{print $2}')
          echo "version=$GO_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache-dependency-path: server/go.sum

      - name: Test
        run: go test -v -count=1 ./...

  matlab:
    name: MATLAB Tests
    runs-on: ${{ inputs.os || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ inputs.matlab_version || 'latest' }}

      - name: Run Tests
        uses: matlab-actions/run-tests@v2
        with:
          source-folder: toolbox
          select-by-folder: toolbox/tests
          test-results-junit: test-results/results.xml

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ inputs.os || 'ubuntu-latest' }}
          path: test-results/results.xml
