name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/test-unit.yml
    with:
      matlab_version: 'latest'
      os: 'ubuntu-latest'

  integration-tests:
    name: Integration Tests
    uses: ./.github/workflows/test-integration.yml
    with:
      matlab_version: 'latest'
      os: 'all'

  build-server:
    name: Build Go Server (${{ matrix.matlab_arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            matlab_arch: glnxa64
            binary: matlab-terminal-server
          - goos: darwin
            goarch: amd64
            matlab_arch: maci64
            binary: matlab-terminal-server
          - goos: darwin
            goarch: arm64
            matlab_arch: maca64
            binary: matlab-terminal-server
          - goos: windows
            goarch: amd64
            matlab_arch: win64
            binary: matlab-terminal-server.exe
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6

      - name: Read Go version from go.mod
        id: go-version
        run: |
          GO_VERSION=$(grep "^go " go.mod | awk '{print $2}')
          echo "version=$GO_VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache-dependency-path: server/go.sum

      - name: Vet
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go vet ./...

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o ../dist/${{ matrix.matlab_arch }}/${{ matrix.binary }} .
